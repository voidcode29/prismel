name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container: node:24-bookworm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: npm ci
      - run: npm run typecheck --workspaces --if-present
      - run: npm run lint --workspaces --if-present
      - run: npm run build --workspaces --if-present

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    container: node:24-bookworm
    env:
      RUN_NUMBER: ${{ github.run_number }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: npm ci
      - run: npm run build --workspaces --if-present
      - run: npm run db:generate -w @prismel/backend
        continue-on-error: true

      - name: Assemble archive
        run: |
          ROOT="$GITHUB_WORKSPACE"
          BUILD_DIR="$ROOT/deploy-build"
          mkdir -p "$BUILD_DIR/backend/dist" "$BUILD_DIR/public" "$BUILD_DIR/data"

          cp "$ROOT/package.json" "$ROOT/package-lock.json" "$BUILD_DIR/"
          cp -r "$ROOT/backend/dist"/* "$BUILD_DIR/backend/dist/"
          cp "$ROOT/backend/package.json" "$ROOT/backend/drizzle.config.ts" "$BUILD_DIR/backend/"
          if [ -d "$ROOT/backend/src/db/migrations" ]; then
            mkdir -p "$BUILD_DIR/backend/dist/db"
            cp -r "$ROOT/backend/src/db/migrations" "$BUILD_DIR/backend/dist/db/"
          fi
          cp -r "$ROOT/frontend/dist"/* "$BUILD_DIR/public/"

          (cd "$BUILD_DIR" && npm ci --omit=dev)

          find "$BUILD_DIR" -type d -exec chmod 755 {} \;
          find "$BUILD_DIR" -type f -exec chmod 644 {} \;
          find "$BUILD_DIR/node_modules/.bin" -type f -exec chmod 755 {} \; 2>/dev/null || true

          (cd "$BUILD_DIR" && tar czf "$ROOT/prismel-$RUN_NUMBER.tar.gz" .)

      - name: Setup SSH and deploy to VPS
        env:
          SSH_AUTH_SOCK: ""
        run: |
          SSH_DIR="/tmp/ssh-deploy"
          mkdir -p "$SSH_DIR"
          echo "$VPS_SSH_KEY" > "$SSH_DIR/deploy_key"
          chmod 600 "$SSH_DIR/deploy_key"
          printf '%s\n' "$VPS_KNOWN_HOSTS" | tr -d '\r' > "$SSH_DIR/known_hosts"

          if [ ! -s "$SSH_DIR/known_hosts" ]; then
            echo "ERROR: VPS_KNOWN_HOSTS secret is empty or not set."
            echo "Run: ssh-keyscan -p <port> <host> 2>/dev/null > vps_known_hosts.txt"
            echo "Then add it as a GitHub Actions secret."
            exit 1
          fi

          SSH_OPTS="-i $SSH_DIR/deploy_key -o UserKnownHostsFile=$SSH_DIR/known_hosts -o IdentitiesOnly=yes"

          scp $SSH_OPTS -P "${VPS_PORT:-22}" \
            prismel-$RUN_NUMBER.tar.gz \
            "$VPS_USER@$VPS_HOST:/tmp/"

          ssh $SSH_OPTS -p "${VPS_PORT:-22}" \
            "$VPS_USER@$VPS_HOST" \
            "bash -s -- $RUN_NUMBER" << 'REMOTE'
          set -euo pipefail
          run_number="$1"
          cd /opt/prismel
          sudo systemctl stop prismel
          tar czf "/tmp/prismel-backup-$(date +%s).tar.gz" --exclude="data" .
          tar xzf "/tmp/prismel-$run_number.tar.gz" -C /opt/prismel/ --exclude="data"
          if [ -f backend/dist/db/migrate.js ]; then
            node backend/dist/db/migrate.js
          fi
          sudo systemctl start prismel
          sleep 5
          curl -fsSv http://localhost:3001/api/health > /dev/null || {
            echo "=== HEALTH CHECK FAILED ==="
            echo "=== systemctl status ==="
            sudo systemctl is-active prismel || true
            echo "=== journalctl last 30 lines ==="
            sudo journalctl -u prismel --no-pager -n 30 || true
            echo "=== listening on port 3001 ==="
            ss -tlnp | grep 3001 || true
            exit 1
          }
          rm "/tmp/prismel-$run_number.tar.gz"
          REMOTE

      - uses: actions/upload-artifact@v4
        with:
          name: prismel-${{ github.run_number }}
          path: prismel-${{ github.run_number }}.tar.gz

  ssh-debug:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    container: node:24-bookworm
    continue-on-error: true
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
    steps:
      - name: Debug SSH setup
        run: |
          SSH_DIR="/tmp/ssh-deploy"
          mkdir -p "$SSH_DIR"
          echo "$VPS_SSH_KEY" > "$SSH_DIR/deploy_key"
          chmod 600 "$SSH_DIR/deploy_key"
          printf '%s\n' "$VPS_KNOWN_HOSTS" | tr -d '\r' > "$SSH_DIR/known_hosts"
          chmod 644 "$SSH_DIR/known_hosts"

          echo "=== known_hosts (first 60 chars per line) ==="
          cut -c1-60 "$SSH_DIR/known_hosts"
          echo "=== line count / byte size ==="
          wc -l "$SSH_DIR/known_hosts"
          wc -c "$SSH_DIR/known_hosts"
          echo "=== VPS_HOST ==="
          echo "VPS_HOST='$VPS_HOST' (length=${#VPS_HOST})"
          echo "=== files in SSH_DIR ==="
          ls -la "$SSH_DIR/"
          echo "=== ssh -vv dry-run ==="
          ssh -vv -i "$SSH_DIR/deploy_key" \
            -o UserKnownHostsFile="$SSH_DIR/known_hosts" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -p "${VPS_PORT:-22}" \
            "$VPS_USER@$VPS_HOST" \
            "echo CONNECTION_OK; whoami; hostname" 2>&1 || echo "SSH exit code: $?"